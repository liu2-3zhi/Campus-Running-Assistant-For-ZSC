<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>天地图 API Key 验证</title>
    <!-- 引入天地图API脚本，替换其中的tk参数为你的API Key -->
    <script src="https://api.tianditu.gov.cn/api?v=4.0&tk=你的APIKey"></script>
    <style>
        #mapDiv {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h2>天地图 API Key 验证页面</h2>
    <div id="mapDiv"></div>

    <script>
        try {
            // 初始化地图
            var map = new T.Map("mapDiv");
            // 设置中心点和缩放级别
            map.centerAndZoom(new T.LngLat(116.40969, 39.89945), 12);
            console.log("地图加载成功，API Key 有效！");
        } catch (e) {
            console.error("地图加载失败，可能是 API Key 无效或网络问题。", e);
            document.getElementById("mapDiv").innerHTML = "<p style='color:red;'>地图加载失败，请检查 API Key 是否正确。</p>";
        }
    </script>
</body>
</html>
