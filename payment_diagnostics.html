<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付功能诊断工具</title>
    <style>
        /* ========================================
           全局样式设置
           ======================================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* ========================================
           主容器样式
           ======================================== */
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        /* ========================================
           标题样式
           ======================================== */
        h1 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        /* ========================================
           按钮样式
           ======================================== */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* ========================================
           结果显示区域样式
           ======================================== */
        #results {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
        }
        
        /* ========================================
           状态标签样式
           ======================================== */
        .status-ok {
            color: #22c55e;
            font-weight: bold;
        }
        
        .status-error {
            color: #ef4444;
            font-weight: bold;
        }
        
        .status-warning {
            color: #f59e0b;
            font-weight: bold;
        }
        
        .status-info {
            color: #3b82f6;
            font-weight: bold;
        }
        
        /* ========================================
           分割线样式
           ======================================== */
        .divider {
            border: none;
            border-top: 2px solid #e2e8f0;
            margin: 20px 0;
        }
        
        /* ========================================
           代码块样式
           ======================================== */
        code {
            background: #1e293b;
            color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        /* ========================================
           进度条样式
           ======================================== */
        .progress {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ========================================
             页面标题区域
             ======================================== -->
        <h1>🔍 支付功能诊断工具</h1>
        <p class="subtitle">快速检测任务14和任务15的功能状态</p>
        
        <!-- ========================================
             进度条：显示诊断进度
             ======================================== -->
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <!-- ========================================
             操作按钮区域
             ======================================== -->
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="btn" onclick="runFullDiagnostics()">
                🚀 开始完整诊断
            </button>
            <button class="btn" onclick="clearResults()">
                🗑️ 清空结果
            </button>
        </div>
        
        <!-- ========================================
             结果显示区域
             ======================================== -->
        <div id="results"></div>
    </div>

    <script>
        /**
         * ========================================
         * JavaScript诊断脚本
         * ========================================
         * 
         * 功能说明：
         * 1. 检查HTML容器是否存在
         * 2. 检查JavaScript函数是否定义
         * 3. 检查会话状态
         * 4. 提供详细的诊断报告和修复建议
         * ========================================
         */

        // 全局变量：存储诊断结果
        let diagnosticResults = [];
        let totalChecks = 0;
        let passedChecks = 0;

        /**
         * 清空结果显示区域
         * 重置所有统计数据
         */
        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('progressBar').style.width = '0%';
            diagnosticResults = [];
            totalChecks = 0;
            passedChecks = 0;
        }

        /**
         * 添加日志到结果显示区域
         * 
         * @param {string} message - 要显示的消息
         * @param {string} type - 消息类型（ok/error/warning/info）
         */
        function log(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const statusClass = `status-${type}`;
            
            // 将消息转换为HTML安全的文本
            const safeMessage = message.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // 添加到显示区域
            resultsDiv.innerHTML += `<div class="${statusClass}">${safeMessage}</div>`;
            
            // 自动滚动到底部
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        /**
         * 更新进度条
         * 
         * @param {number} percentage - 进度百分比（0-100）
         */
        function updateProgress(percentage) {
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        /**
         * 运行完整的诊断检查
         * 这是主函数，协调所有检查步骤
         */
        async function runFullDiagnostics() {
            // 清空之前的结果
            clearResults();
            
            // 显示开始信息
            log('='.repeat(70), 'info');
            log('🚀 开始支付功能完整诊断', 'info');
            log('='.repeat(70), 'info');
            log('');
            
            updateProgress(5);
            
            // 第1步：检查任务14（支付方式管理）
            await checkTask14();
            updateProgress(50);
            
            // 第2步：检查任务15（订单查询）
            await checkTask15();
            updateProgress(90);
            
            // 第3步：生成总结报告
            generateSummary();
            updateProgress(100);
            
            log('');
            log('='.repeat(70), 'info');
            log('✅ 诊断完成！', 'ok');
            log('='.repeat(70), 'info');
        }

        /**
         * 检查任务14：支付方式管理功能
         * 验证HTML容器和JavaScript函数
         */
        async function checkTask14() {
            log('', 'info');
            log('【任务14】验证支付方式管理功能', 'info');
            log('-'.repeat(70), 'info');
            
            // 检查1：移动端支付方式列表容器
            totalChecks++;
            log('✓ 检查1：payment-methods-list 容器（移动端）', 'info');
            const containerMobile = document.getElementById('payment-methods-list');
            if (containerMobile) {
                log('  ✅ 移动端容器存在', 'ok');
                log(`  - ID: payment-methods-list`, 'info');
                log(`  - 类名: ${containerMobile.className}`, 'info');
                log(`  - 当前内容长度: ${containerMobile.innerHTML.length} 字符`, 'info');
                passedChecks++;
                diagnosticResults.push({ check: '任务14-容器', status: 'pass' });
            } else {
                log('  ❌ 移动端容器不存在！', 'error');
                log('  💡 修复建议：检查 index.html 文件，确保存在 id="payment-methods-list" 的元素', 'warning');
                diagnosticResults.push({ check: '任务14-容器', status: 'fail' });
            }
            
            // 检查2：PC端支付方式列表容器（用于对比）
            log('', 'info');
            log('✓ 检查2：payment-methods-list_modal 容器（PC端）', 'info');
            const containerPC = document.getElementById('payment-methods-list_modal');
            if (containerPC) {
                log('  ✅ PC端容器存在', 'ok');
            } else {
                log('  ⚠️  PC端容器不存在（如果当前在移动端，这是正常的）', 'warning');
            }
            
            // 检查3：loadPaymentMethodsConfig 函数
            totalChecks++;
            log('', 'info');
            log('✓ 检查3：loadPaymentMethodsConfig() 函数', 'info');
            if (typeof loadPaymentMethodsConfig === 'function') {
                log('  ✅ 函数已定义', 'ok');
                const funcStr = loadPaymentMethodsConfig.toString();
                if (funcStr.includes('payment-methods-list_modal') && funcStr.includes('payment-methods-list')) {
                    log('  ✅ 函数包含移动端和PC端容器支持', 'ok');
                    log('  - 策略：优先PC端，回退到移动端', 'info');
                    passedChecks++;
                    diagnosticResults.push({ check: '任务14-loadPaymentMethodsConfig', status: 'pass' });
                } else {
                    log('  ❌ 函数不支持移动端容器', 'error');
                    log('  💡 修复建议：检查 main.js 文件中的 loadPaymentMethodsConfig 函数实现', 'warning');
                    diagnosticResults.push({ check: '任务14-loadPaymentMethodsConfig', status: 'fail' });
                }
            } else {
                log('  ❌ 函数未定义', 'error');
                log('  💡 修复建议：检查 main.js 是否正确加载', 'warning');
                diagnosticResults.push({ check: '任务14-loadPaymentMethodsConfig', status: 'fail' });
            }
            
            // 检查4：savePaymentMethodsConfig 函数
            totalChecks++;
            log('', 'info');
            log('✓ 检查4：savePaymentMethodsConfig() 函数', 'info');
            if (typeof savePaymentMethodsConfig === 'function') {
                log('  ✅ 函数已定义', 'ok');
                const funcStr = savePaymentMethodsConfig.toString();
                if (funcStr.includes('payment-methods-list_modal') && funcStr.includes('payment-methods-list')) {
                    log('  ✅ 函数包含移动端和PC端容器支持', 'ok');
                    passedChecks++;
                    diagnosticResults.push({ check: '任务14-savePaymentMethodsConfig', status: 'pass' });
                } else {
                    log('  ❌ 函数不支持移动端容器', 'error');
                    diagnosticResults.push({ check: '任务14-savePaymentMethodsConfig', status: 'fail' });
                }
            } else {
                log('  ❌ 函数未定义', 'error');
                diagnosticResults.push({ check: '任务14-savePaymentMethodsConfig', status: 'fail' });
            }
            
            // 检查5：openAddPaymentMethodModal 函数
            totalChecks++;
            log('', 'info');
            log('✓ 检查5：openAddPaymentMethodModal() 函数', 'info');
            if (typeof openAddPaymentMethodModal === 'function') {
                log('  ✅ 函数已定义', 'ok');
                log('  ℹ️  说明：此函数职责是打开模态框，列表渲染由 loadPaymentMethodsConfig 负责', 'info');
                passedChecks++;
                diagnosticResults.push({ check: '任务14-openAddPaymentMethodModal', status: 'pass' });
            } else {
                log('  ❌ 函数未定义', 'error');
                diagnosticResults.push({ check: '任务14-openAddPaymentMethodModal', status: 'fail' });
            }
            
            // 检查6：会话状态
            totalChecks++;
            log('', 'info');
            log('✓ 检查6：会话状态（sessionUUID）', 'info');
            if (typeof sessionUUID !== 'undefined' && sessionUUID) {
                log('  ✅ 会话ID已设置', 'ok');
                log(`  - Session ID: ${sessionUUID.substring(0, 8)}...`, 'info');
                passedChecks++;
                diagnosticResults.push({ check: '会话状态', status: 'pass' });
            } else {
                log('  ❌ 会话ID未设置', 'error');
                log('  💡 修复建议：请先登录管理员账户', 'warning');
                diagnosticResults.push({ check: '会话状态', status: 'fail' });
            }
        }

        /**
         * 检查任务15：订单查询功能
         * 验证订单列表容器、输入框和相关函数
         */
        async function checkTask15() {
            log('', 'info');
            log('【任务15】验证订单查询功能', 'info');
            log('-'.repeat(70), 'info');
            
            // 检查7：移动端订单列表容器
            totalChecks++;
            log('✓ 检查7：admin-orders-table-body 容器（移动端）', 'info');
            const ordersContainerMobile = document.getElementById('admin-orders-table-body');
            if (ordersContainerMobile) {
                log('  ✅ 移动端订单容器存在', 'ok');
                log(`  - ID: admin-orders-table-body`, 'info');
                log(`  - 类名: ${ordersContainerMobile.className}`, 'info');
                log(`  - 当前内容长度: ${ordersContainerMobile.innerHTML.length} 字符`, 'info');
                passedChecks++;
                diagnosticResults.push({ check: '任务15-容器', status: 'pass' });
            } else {
                log('  ❌ 移动端订单容器不存在！', 'error');
                log('  💡 修复建议：检查 index.html 文件，确保存在 id="admin-orders-table-body" 的元素', 'warning');
                diagnosticResults.push({ check: '任务15-容器', status: 'fail' });
            }
            
            // 检查8：筛选输入框
            log('', 'info');
            log('✓ 检查8：订单筛选输入框（移动端）', 'info');
            const filters = [
                { id: 'admin-filter-status', name: '状态筛选' },
                { id: 'admin-filter-paytype', name: '支付方式筛选' },
                { id: 'admin-filter-username', name: '用户名搜索' },
                { id: 'admin-filter-orderno', name: '订单号搜索' },
                { id: 'admin-manual-query-order-no', name: '手动查询输入框' }
            ];
            
            let allFiltersExist = true;
            filters.forEach(filter => {
                const elem = document.getElementById(filter.id);
                if (elem) {
                    log(`  ✅ ${filter.name}存在: ${filter.id}`, 'ok');
                } else {
                    log(`  ❌ ${filter.name}不存在: ${filter.id}`, 'error');
                    allFiltersExist = false;
                }
            });
            
            totalChecks++;
            if (allFiltersExist) {
                passedChecks++;
                diagnosticResults.push({ check: '任务15-筛选输入框', status: 'pass' });
            } else {
                diagnosticResults.push({ check: '任务15-筛选输入框', status: 'fail' });
            }
            
            // 检查9：loadAllPaymentOrders 函数
            totalChecks++;
            log('', 'info');
            log('✓ 检查9：loadAllPaymentOrders() 函数', 'info');
            if (typeof loadAllPaymentOrders === 'function') {
                log('  ✅ 函数已定义', 'ok');
                const funcStr = loadAllPaymentOrders.toString();
                if (funcStr.includes('admin-orders-table-body_modal') && funcStr.includes('admin-orders-table-body')) {
                    log('  ✅ 函数支持移动端和PC端容器', 'ok');
                    passedChecks++;
                    diagnosticResults.push({ check: '任务15-loadAllPaymentOrders', status: 'pass' });
                } else {
                    log('  ❌ 函数不支持移动端容器', 'error');
                    diagnosticResults.push({ check: '任务15-loadAllPaymentOrders', status: 'fail' });
                }
            } else {
                log('  ❌ 函数未定义', 'error');
                diagnosticResults.push({ check: '任务15-loadAllPaymentOrders', status: 'fail' });
            }
            
            // 检查10：queryOrderManually 函数
            totalChecks++;
            log('', 'info');
            log('✓ 检查10：queryOrderManually() 函数', 'info');
            if (typeof queryOrderManually === 'function') {
                log('  ✅ 函数已定义', 'ok');
                const funcStr = queryOrderManually.toString();
                if (funcStr.includes('admin-manual-query-order-no_modal') && funcStr.includes('admin-manual-query-order-no')) {
                    log('  ✅ 函数支持移动端和PC端输入框', 'ok');
                    passedChecks++;
                    diagnosticResults.push({ check: '任务15-queryOrderManually', status: 'pass' });
                } else {
                    log('  ❌ 函数不支持移动端输入框', 'error');
                    diagnosticResults.push({ check: '任务15-queryOrderManually', status: 'fail' });
                }
            } else {
                log('  ❌ 函数未定义', 'error');
                diagnosticResults.push({ check: '任务15-queryOrderManually', status: 'fail' });
            }
            
            // 检查11：fetchOrdersFromPlatform 函数
            totalChecks++;
            log('', 'info');
            log('✓ 检查11：fetchOrdersFromPlatform() 函数', 'info');
            if (typeof fetchOrdersFromPlatform === 'function') {
                log('  ✅ 函数已定义', 'ok');
                log('  ℹ️  说明：此函数通过调用 loadAllPaymentOrders 实现功能', 'info');
                passedChecks++;
                diagnosticResults.push({ check: '任务15-fetchOrdersFromPlatform', status: 'pass' });
            } else {
                log('  ❌ 函数未定义', 'error');
                diagnosticResults.push({ check: '任务15-fetchOrdersFromPlatform', status: 'fail' });
            }
            
            // 检查12：renderPaymentOrdersTable 函数
            totalChecks++;
            log('', 'info');
            log('✓ 检查12：renderPaymentOrdersTable() 函数', 'info');
            if (typeof renderPaymentOrdersTable === 'function') {
                log('  ✅ 函数已定义', 'ok');
                const funcStr = renderPaymentOrdersTable.toString();
                if (funcStr.includes('admin-orders-table-body_modal') && funcStr.includes('admin-orders-table-body')) {
                    log('  ✅ 函数会同时渲染到移动端和PC端容器', 'ok');
                    passedChecks++;
                    diagnosticResults.push({ check: '任务15-renderPaymentOrdersTable', status: 'pass' });
                } else {
                    log('  ❌ 函数不同时支持两个容器', 'error');
                    diagnosticResults.push({ check: '任务15-renderPaymentOrdersTable', status: 'fail' });
                }
            } else {
                log('  ❌ 函数未定义', 'error');
                diagnosticResults.push({ check: '任务15-renderPaymentOrdersTable', status: 'fail' });
            }
        }

        /**
         * 生成诊断总结报告
         * 显示通过率和具体建议
         */
        function generateSummary() {
            log('', 'info');
            log('='.repeat(70), 'info');
            log('📊 诊断总结报告', 'info');
            log('='.repeat(70), 'info');
            log('', 'info');
            
            // 计算通过率
            const passRate = totalChecks > 0 ? ((passedChecks / totalChecks) * 100).toFixed(1) : 0;
            log(`✓ 总检查项: ${totalChecks}`, 'info');
            log(`✓ 通过项: ${passedChecks}`, 'ok');
            log(`✓ 失败项: ${totalChecks - passedChecks}`, passedChecks === totalChecks ? 'ok' : 'error');
            log(`✓ 通过率: ${passRate}%`, passedChecks === totalChecks ? 'ok' : 'warning');
            log('', 'info');
            
            // 根据通过率给出建议
            if (passedChecks === totalChecks) {
                log('🎉 太棒了！所有检查项都通过了！', 'ok');
                log('', 'info');
                log('✅ 任务14（支付方式管理）：功能正常', 'ok');
                log('✅ 任务15（订单查询）：功能正常', 'ok');
                log('', 'info');
                log('💡 如果功能仍然无法使用，可能的原因：', 'info');
                log('  1. 后端API问题 - 检查 main.py 中的相关API端点', 'info');
                log('  2. 网络问题 - 检查浏览器控制台的网络请求', 'info');
                log('  3. 数据问题 - 检查数据库中是否有数据', 'info');
                log('  4. 权限问题 - 确认当前用户是否有管理员权限', 'info');
            } else {
                log('⚠️  发现问题！请根据上述错误提示进行修复。', 'warning');
                log('', 'info');
                
                // 列出失败的检查项
                const failedChecks = diagnosticResults.filter(r => r.status === 'fail');
                if (failedChecks.length > 0) {
                    log('❌ 失败的检查项：', 'error');
                    failedChecks.forEach((result, index) => {
                        log(`  ${index + 1}. ${result.check}`, 'error');
                    });
                }
                
                log('', 'info');
                log('💡 常见问题修复指南：', 'info');
                log('  1. 如果容器不存在 → 检查 index.html 文件是否完整', 'info');
                log('  2. 如果函数未定义 → 检查 main.js 是否正确加载', 'info');
                log('  3. 如果会话无效 → 重新登录管理员账户', 'info');
                log('  4. 清除浏览器缓存后重试（Ctrl+F5）', 'info');
            }
            
            log('', 'info');
            log('='.repeat(70), 'info');
            log('🔗 更多帮助：', 'info');
            log('  - 查看浏览器控制台（F12）的错误信息', 'info');
            log('  - 检查网络请求是否成功（Network标签）', 'info');
            log('  - 查看详细验证报告：/tmp/verification_report.md', 'info');
            log('='.repeat(70), 'info');
        }
    </script>
</body>
</html>
