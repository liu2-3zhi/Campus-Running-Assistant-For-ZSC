version: '3.8'

services:
  python-running-helper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-running-helper
    ports:
      # HTTP端口映射
      - "8080:80"
      # HTTPS端口映射
      - "8443:443"
      - "5000:5000"
    volumes:
      # SSL证书目录挂载（将宿主机的证书挂载到容器内）
      - ./ssl:/app/ssl:ro
      # 配置文件挂载
      - ./config.ini:/app/config.ini
      # 数据持久化目录
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./messages.json:/app/messages.json
      - ./permissions.json:/app/permissions.json
      - ./reminders.json:/app/reminders.json
      - ./background_tasks:/app/background_tasks
      - ./school_accounts:/app/school_accounts
      - ./sessions:/app/sessions
      - ./tokens:/app/tokens
      - ./system_accounts:/app/system_accounts

    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    
    # 限制Docker容器日志大小
    logging:
      driver: "json-file"
      options:
        max-size: "10m"  # 单个日志文件最大10MB
        max-file: "3"    # 最多保留3个日志文件
        
    networks:
      - app-network

  # ============================================================
  # Sensitive-lexicon 服务 - 敏感词检测服务
  # ============================================================
  sensitive-lexicon:
    # 使用 Sensitive-lexicon 子模块中的 Dockerfile 构建镜像
    build:
      context: ./Sensitive-lexicon
      dockerfile: Dockerfile
    # 容器名称
    container_name: sensitive-lexicon
    # 端口映射: 宿主机端口:容器端口
    # 注意: 宿主机使用 8081 端口以避免与 python-running-helper 的 8080 端口冲突
    #       容器内部仍然使用 8080 端口
    #       在容器内部网络中,通过服务名 "sensitive-lexicon:8080" 访问
    ports:
      - "8081:8080"
    # 环境变量配置
    environment:
      # 服务监听端口
      - PORT=8080
      # 词库目录路径（相对于容器内工作目录）
      - LEXICON_DIR=Vocabulary
      # 模糊匹配的最大编辑距离（1表示允许1个字符的差异）
      - FUZZY_MAX_DISTANCE=1
    # 容器重启策略：除非手动停止，否则总是重启
    restart: unless-stopped
    # 网络配置：连接到应用网络
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
