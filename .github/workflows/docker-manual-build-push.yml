name: 手动构建并推送 Docker 镜像

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签"
        required: true
        default: "latest"

permissions:
  contents: read

env:
  IMAGE_NAME: python_runing-python-running-helper
  REGISTRY: hongkong.zelly.cn
  REGISTRY_PREFIX: hongkong.zelly.cn/python_runing-python-running-helper

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1) 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2) 初始化 buildx
      - name: 初始化 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3) 登录私有镜像仓库
      - name: 登录镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4) 恢复 GitHub Actions 缓存
      - name: 恢复 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      # 5) 拉取上一次构建的镜像作为缓存来源
      - name: 拉取上一次构建的镜像缓存
        run: |
          docker pull "${REGISTRY_PREFIX}/${IMAGE_NAME}:latest" || true

      # 6) 拉取 Dockerfile 中的基础镜像，确保基础镜像为最新
      - name: 拉取基础镜像
        run: |
          BASE_IMAGE=$(grep -i '^FROM ' Dockerfile | head -n1 | awk '{print $2}')
          echo "基础镜像: $BASE_IMAGE"
          docker pull "$BASE_IMAGE" || true

      # 7) 使用 buildx 构建镜像（使用 GHA + registry 双缓存）
      - name: 构建并推送镜像（带缓存）
        run: |
          FINAL_TAG="${REGISTRY_PREFIX}/${IMAGE_NAME}:${{ github.event.inputs.image_tag }}"
          LATEST_TAG="${REGISTRY_PREFIX}/${IMAGE_NAME}:latest"

          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-from type=registry,ref=${LATEST_TAG} \
            --cache-to type=local,dest=/tmp/.buildx-cache,mode=max \
            --cache-to type=registry,ref=${LATEST_TAG},mode=max \
            -t "${FINAL_TAG}" \
            -t "${LATEST_TAG}" \
            --push \
            .

      # 8) 保存 GHA 缓存（供下次构建使用）
      - name: 保存 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
