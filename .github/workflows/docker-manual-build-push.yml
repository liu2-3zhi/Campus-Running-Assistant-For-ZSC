name: 手动构建并推送 Docker 镜像

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签"
        required: true
        default: "latest"

permissions:
  contents: read

env:
  IMAGE_NAME: python_runing-python-running-helper
  REGISTRY: hongkong.zelly.cn
  REGISTRY_PREFIX: hongkong.zelly.cn/python_runing-python-running-helper

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1) 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2) 登录镜像仓库
      - name: 登录镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3) 恢复 GHA 缓存
      - name: 恢复 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: Docker-image-build-latest
          restore-keys: |
            buildx-

      # 4) 拉取基础镜像（确保最新）
      - name: 拉取基础镜像
        run: |
          BASE_IMAGE=$(grep -i '^FROM ' Dockerfile | head -n1 | awk '{print $2}')
          echo "基础镜像: $BASE_IMAGE"
          docker pull "$BASE_IMAGE" || true

      # 5) 使用 build-push-action@v5 构建并推送
      - name: 构建并推送镜像（build-push-action@v5）
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
            ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:latest

          # 仅使用 GHA 缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      # 6) 保存 GHA 缓存
      - name: 保存 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: Docker-image-build-latest
