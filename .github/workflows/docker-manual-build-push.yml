name: 手动构建并推送 Docker 镜像

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: campus-running-assistant-for-zsc
  REGISTRY: docker.io
  REGISTRY_PREFIX: docker.io/${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 生成时间戳 TAG
        id: time
        run: |
          TAG=$(date +"%Y_%m_%d_%H_%M_%S")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "生成的时间标签: $TAG"

      - name: 初始化 Buildx（container driver）
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 恢复 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: Docker-image-build-latest
          restore-keys: |
            buildx-

      - name: 拉取 Registry 缓存镜像（如果存在）
        run: |
          CACHE_IMAGE="${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:cache"
          echo "尝试拉取缓存镜像: $CACHE_IMAGE"
          docker pull "$CACHE_IMAGE" || true

      - name: 拉取基础镜像
        run: |
          BASE_IMAGE=$(grep -i '^FROM ' Dockerfile | head -n1 | awk '{print $2}')
          echo "基础镜像: $BASE_IMAGE"
          docker pull "$BASE_IMAGE" || true

      - name: 构建并推送镜像（使用 GHA + Registry 双缓存）
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true

          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:${{ steps.time.outputs.tag }}
            ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:latest

          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=registry,ref=${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:cache

          cache-to: |
            type=local,dest=/tmp/.buildx-cache,mode=max
            type=registry,ref=${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:cache,mode=max

      - name: 保存 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: Docker-image-build-latest
