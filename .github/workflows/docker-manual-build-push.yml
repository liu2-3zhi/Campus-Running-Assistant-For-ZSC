name: 手动构建并推送 Docker 镜像

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签"
        required: true
        default: "latest"

permissions:
  contents: read

env:
  IMAGE_NAME: Campus-Running-Assistant-For-ZSC
  REGISTRY: docker.io
  REGISTRY_PREFIX: docker.io/${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 初始化 Buildx（container driver）
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 恢复 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: Docker-image-build-latest
          restore-keys: |
            buildx-

      - name: 拉取基础镜像
        run: |
          BASE_IMAGE=$(grep -i '^FROM ' Dockerfile | head -n1 | awk '{print $2}')
          echo "基础镜像: $BASE_IMAGE"
          docker pull "$BASE_IMAGE" || true

      - name: 构建并推送镜像（build-push-action@v5）
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
            ${{ env.REGISTRY_PREFIX }}/${{ env.IMAGE_NAME }}:latest

          # 仅使用 GHA 缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: 保存 GHA 构建缓存
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: Docker-image-build-latest
