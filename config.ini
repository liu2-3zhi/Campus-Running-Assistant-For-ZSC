# ========================================
# 跑步工具配置文件
# ========================================
# 说明：修改配置后需要重启程序生效
# ========================================

[Admin]
# 超级管理员账号名称（有且只有一个）
# 注意：super_admin 只能在此配置文件中设置，不能在界面创建
# 默认账号: admin，默认密码: admin（首次登录后请立即修改）
super_admin = admin

[Guest]
# 是否允许游客登录（true/false）
# true：允许未注册用户以游客身份使用系统（权限受限）
# false：禁止游客登录，所有用户必须注册
allow_guest_login = true

[System]
# 会话过期时间（天）
# 超过此时间未访问的会话将自动清理
session_expiry_days = 7
# 学校账号数据存储目录
school_accounts_dir = school_accounts
# 系统账号数据存储目录
system_accounts_dir = system_accounts
# 权限配置文件路径
permissions_file = permissions.json
# 会话持久化数据存储目录
sessions_dir = sessions
# API令牌数据存储目录
tokens_dir = tokens
# 会话监控检查间隔时间（秒）
# 系统每隔此时间检查一次会话活跃状态，默认60秒
session_monitor_check_interval = 60
# 会话不活跃超时时间（秒）
# 会话超过此时间无活动（且无正在执行的任务）将被自动清理，默认300秒（5分钟）
session_inactivity_timeout = 300

[Logging]
# 单个日志文件最大大小（MB）
# 超过此大小时会自动轮转到新文件（如 zx-slm-tool-01.log）
log_rotation_size_mb = 10
# 归档目录最大大小（MB）
# 超过此大小时会删除最早的归档文件，设置为0表示不限制
archive_max_size_mb = 500
# 日志文件存储目录
log_dir = logs
# 日志归档目录（启动时会自动压缩旧日志到此目录）
archive_dir = logs/archive

[Security]
# 密码存储方式（plaintext/sha256/bcrypt）
# plaintext：明文存储（不推荐，仅用于测试）
# sha256：SHA256哈希（已弃用，不够安全）
# bcrypt：bcrypt加密（推荐，自动加盐，抗暴力破解）
password_storage = plaintext
# 是否启用暴力破解防护（true/false）
# true：启用登录尝试限制和账号临时锁定
brute_force_protection = true
# 登录日志保留天数
# 超过此时间的登录审计日志将被清理
login_log_retention_days = 90

[Map]
# 高德地图 JS API 密钥
# 用于前端地图显示，请在高德开放平台申请：https://console.amap.com/
# 申请类型：Web端(JS API)，服务平台：Web端
amap_js_key = 

# ========================================
# [API] 第三方API配置
# ========================================
[API]
# IP地理位置查询API密钥（可选）
# 用于获取用户登录IP的地理位置信息
# 留空则使用免费接口（有频率限制）
ip_api_key = 
# 注意：验证码已改用本地生成器（见[Captcha]节），不再需要第三方API密钥

# ========================================
# [CDN] CDN缓存配置
# ========================================
[CDN]
# 是否启用CDN缓存（true/false）
# true：启用CDN缓存，提高静态资源加载速度
# false：禁用CDN缓存，所有资源直接从服务器获取
cdn_enabled = true
# CDN缓存时间（秒）
# 设置静态资源在CDN上的缓存有效期
# 建议值：3600（1小时）、21600（6小时）、86400（24小时）
cache_time = 3600

# ========================================
# [Captcha] 本地验证码生成器配置
# ========================================
# 使用MicroPixelCaptcha生成黑白像素风格验证码
# 无需第三方API，更稳定、更安全、响应更快
# ========================================

[Captcha]
# 验证码字符数（3-6）
length = 4
# 像素细分倍数（2-4）
scale_factor = 2
# 噪点比例（0.0-0.3）
noise_level = 0.08

[Features]
# 是否允许用户修改手机号（true/false）
# true：用户可在个人资料中修改手机号
enable_phone_modification = false
# 是否支持手机号登录（true/false）
# true：用户可使用手机号+密码登录（手机号作为login_id）
enable_phone_login = false
# 注册时是否需要短信验证（true/false）
# true：用户注册时必须填写手机号并通过短信验证码验证
enable_phone_registration_verify = false
# 短信服务总开关（true/false）
# false：关闭所有短信功能，即使其他选项为true也不会发送短信
enable_sms_service = false

[SMS_Service_SMSBao]
# 短信宝服务配置（官网：https://www.smsbao.com/）
# 用于发送验证码、通知等短信
# 注意：使用前需要在短信宝注册账号并充值
# 短信宝账户用户名
username = 
# 短信宝API密钥（在短信宝后台获取）
api_key = 
# 短信签名（需提前在短信宝审核通过，格式：【签名内容】）
signature = 【电科大跑步助手】
# 注册验证码短信模板（{code}会被替换为验证码，{minutes}会被替换为有效期分钟数）
template_register = 您的验证码是：{code}，{minutes}分钟内有效。
# 验证码有效期（分钟），默认5分钟，管理员可根据需要修改
code_expire_minutes = 5
# 发送间隔（秒），默认180秒（3分钟），防止频繁发送，增强安全性
send_interval_seconds = 180
# 单个账号每天最多发送次数（防止滥用）
rate_limit_per_account_day = 10
# 单个IP每天最多发送次数（防止攻击）
rate_limit_per_ip_day = 20
# 单个手机号每天最多发送次数（防止骚扰）
rate_limit_per_phone_day = 5

[SSL]
# SSL/HTTPS 配置
# 是否启用SSL（true/false）
# true：启用HTTPS协议访问
# false：使用HTTP协议访问
ssl_enabled = false
# SSL证书文件路径
# 用于HTTPS服务的证书文件（PEM格式）
ssl_cert_path = ssl/fullchain.pem
# SSL私钥文件路径
# 用于HTTPS服务的私钥文件（KEY格式）
ssl_key_path = ssl/privkey.key
# 是否仅允许HTTPS访问（true/false）
# true：禁止HTTP访问，所有HTTP请求将被重定向到HTTPS
# false：同时允许HTTP和HTTPS访问
# 由于端口具有绑定优先级，只要开启HTTPS，但未开启此选项，HTTP可能仍然无法访问
https_only = false

[Beian]
# 网站备案信息配置
# 根据中国相关法律法规，经营性网站需要进行ICP备案和公安网备案
# ICP备案号（工信部）
# 格式示例：京ICP备12345678号
# 留空则不显示（即使show_icp为true）
icp_number = 
# 是否在页面底部显示ICP备案信息（true/false）
# true：显示ICP备案号并链接至 http://beian.miit.gov.cn
# false：不显示ICP备案信息
show_icp = false
# 公安网备案号（公安部）
# 格式示例：京公网安备 11010802012345号
# 留空则不显示（即使show_police为true）
police_number = 
# 是否在页面底部显示公安网备案信息（true/false）
# true：显示公安网备案号并链接至 https://beian.mps.gov.cn
# false：不显示公安网备案信息
show_police = false

[baidu_cloud]
# 百度云文本审核服务配置
# 用于检测用户提交的文本内容是否包含违规信息（如色情、暴力、政治敏感等）
# 申请地址：https://console.bce.baidu.com/ai/#/ai/antiporn/overview/index
# API Key（必填）：在百度云控制台创建应用后获取
api_key = 
# Secret Key（必填）：在百度云控制台创建应用后获取
secret_key = 
# 策略ID（可选）：不填则使用百度云默认审核策略
# 如需自定义审核策略，请在百度云控制台配置后填写策略ID
strategy_id = 

[Content_Review]
# 内容审核功能配置
# 是否启用留言内容审核（true/false）
# true：启用审核，使用百度云文本审核服务检测留言内容
#       留言将被检测是否包含违规信息（色情、暴力、政治敏感等）
#       不合规的留言将被拒绝并保存到 logs/rejected_messages.json
# false：不启用审核，留言直接发布（默认）
# 注意：启用此功能需要先配置百度云API密钥（见上方[baidu_cloud]配置节）
enable_message_review = false

# ============================================================
# [Rainbow_YiPay] 彩虹易支付V2配置
# ============================================================
# 彩虹易支付是第三方支付聚合平台，支持支付宝、微信支付等多种支付方式
# 使用前需要：
# 1. 在彩虹易支付平台注册商户账号
# 2. 获取商户ID（PID）和商户密钥（KEY）
# 3. 配置应用访问域名（app_host），系统会自动构造异步通知URL
# 4. 可选配置同步返回URL（return_url），也可在创建订单时动态传入
# ============================================================

[Rainbow_YiPay]
# 易支付接口域名（必填）
# 这是彩虹易支付平台提供的API接口地址
# 格式示例：https://api.example.com 或 https://pay.yourdomain.com
# 注意：必须包含协议头（http:// 或 https://），末尾不要添加斜杠
host = 
# 商户ID（PID）（必填）
# 在彩虹易支付平台注册后获取的唯一商户标识
# 格式：通常为纯数字，例如：10001
pid = 
# 商户密钥（KEY）（必填）
# 用于生成和验证支付请求签名的密钥，请妥善保管，切勿泄露
# 格式：通常为32位随机字符串
# 示例：abcdef1234567890abcdef1234567890
key = 
# 应用访问域名（必填）
# 本应用的公网访问地址，用于自动构造异步通知URL
# 格式示例：https://yourdomain.com 或 https://www.example.com
# 注意：
# 1. 必须是公网可访问的HTTPS地址
# 2. 包含协议头（http:// 或 https://），末尾不要添加斜杠
# 3. 系统会自动拼接为：{app_host}/api/payment/yipay_notify
app_host = 
# 异步通知URL（已废弃）
# ⚠️ 此配置项已废弃，现在 notify_url 会根据 app_host 自动构造
# 格式：{app_host}/api/payment/yipay_notify
# 无需手动配置，保留此项仅为向后兼容
notify_url = 
# 同步返回URL（可选）
# 用户支付完成后，浏览器会跳转到此URL显示支付结果
# 格式示例：https://yourdomain.com/payment/success
# 注意：
# 1. 此URL仅用于页面展示，不能作为支付成功的判断依据
# 2. 支付状态必须以异步通知（notify_url）的结果为准
# 3. 用户可能不会访问此页面（如直接关闭浏览器）
# 4. 可以在创建订单时动态传入不同的 return_url，此处配置的是默认值
return_url = 
# 启用的支付方式（可选）
# 管理员可配置启用哪些支付方式，使用逗号分隔
# 支持的支付方式：
#   - alipay: 支付宝支付（推荐，覆盖率最高）
#   - wxpay: 微信支付（移动端常用）
#   - bank: 网银支付（适合大额支付）
# 示例：
#   - alipay,wxpay         启用支付宝和微信支付
#   - alipay,wxpay,bank    启用所有支付方式
#   - alipay               只启用支付宝支付
# 默认值：alipay,wxpay
# 注意：
# 1. 启用的支付方式必须在您的易支付商户后台已开通
# 2. 前端创建订单时会验证支付方式是否在启用列表中
# 3. 修改此配置后无需重启服务器，下次创建订单时生效
enabled_payment_methods = alipay,wxpay
# 支付方式详细配置（JSON格式）
# 定义所有支持的支付方式及其显示信息（名称、SVG图标、描述等）
# 管理员可以在此添加新的支付方式或修改现有支付方式的显示信息
# 每个支付方式包含：name(名称)、icon(图标类型)、svg(SVG代码)、description(描述)、borderColor(边框色)、textColor(文字色)
# 注意：
# 1. 必须保持JSON格式正确，建议使用在线JSON验证工具检查
# 2. SVG图标代码中的引号需要使用单引号，或者对双引号进行转义
# 3. 添加新支付方式后，还需要在 enabled_payment_methods 中启用它
# 4. 修改此配置后无需重启服务器，前端会动态加载最新配置
payment_methods_config = {"alipay": {"name": "支付宝支付", "icon": "svg", "svg": "<svg class=\"w-5 h-5 text-sky-600\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z\"></path></svg>", "description": "支持支付宝扫码支付", "borderColor": "hover:border-sky-500", "textColor": "text-sky-600"}, "wxpay": {"name": "微信支付", "icon": "svg", "svg": "<svg class=\"w-5 h-5 text-green-600\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z\"></path></svg>", "description": "支持微信扫码支付", "borderColor": "hover:border-green-500", "textColor": "text-green-600"}, "bank": {"name": "网银支付", "icon": "svg", "svg": "<svg class=\"w-5 h-5 text-blue-600\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z\"></path></svg>", "description": "支持各大银行网银支付", "borderColor": "hover:border-blue-500", "textColor": "text-blue-600"}, "qqpay": {"name": "QQ钱包", "icon": "svg", "svg": "<svg class=\"w-5 h-5 text-indigo-600\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z\"></path></svg>", "description": "支持QQ钱包扫码支付", "borderColor": "hover:border-indigo-500", "textColor": "text-indigo-600"}, "unionpay": {"name": "云闪付", "icon": "svg", "svg": "<svg class=\"w-5 h-5 text-red-600\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z\"></path></svg>", "description": "支持云闪付扫码支付", "borderColor": "hover:border-red-500", "textColor": "text-red-600"}}

